name: Strava Club Sync - Daily

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm install
    - name: Run sync script
      env:
        STRAVA_CLUB_ID: ${{ secrets.STRAVA_CLUB_ID }}
        STRAVA_COOKIE: ${{ secrets.STRAVA_COOKIE }}
        GOOGLE_SHEET_WEBAPP_URL: ${{ secrets.GOOGLE_SHEET_WEBAPP_URL }}
        SYNC_MODE: daily
      run: node sync.js
